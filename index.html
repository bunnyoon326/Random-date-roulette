<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>랜덤 데이트 룰렛</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>🎟️ 랜덤 데이트 룰렛</h1>
        <p>
          항목별 룰렛을 돌려 오늘의 데이트 코스를 완성해보세요. 
          <strong>스핀 → 결과 확인 → 다음 단계</strong> 순서로 진행됩니다.
        </p>
      </header>

      <section class="progress-wrap">
        <ol id="progress" class="progress"></ol>
      </section>

      <section class="roulette-card">
        <p id="stepLabel" class="step-label"></p>
        <div id="wheel" class="wheel">SPIN</div>
        <button id="spinBtn" class="btn primary" type="button">룰렛 돌리기</button>

        <div id="resultArea" class="result-area" aria-live="polite"></div>

        <div class="actions">
          <button id="nextBtn" class="btn" type="button" disabled>다음 단계</button>
          <button id="restartBtn" class="btn ghost" type="button">처음부터 다시</button>
        </div>
      </section>

      <section id="finalPlan" class="final-plan hidden">
        <h2>💑 오늘의 랜덤 데이트 코스</h2>
        <ul id="planList"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
